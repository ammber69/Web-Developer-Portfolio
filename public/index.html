<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Antonio Monterrosas | Software Engineer & Data Analyst. Especialista en crear soluciones digitales escalables, desarrollo web moderno y análisis de datos de alto impacto."
    />
    <meta property="og:title" content="Antonio | Software Engineer & Data Analyst" />
    <meta property="og:description" content="Especialista en crear soluciones digitales escalables, desarrollo web moderno y análisis de datos de alto impacto." />
    <meta property="og:type" content="website" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Antonio Software Engineer and Data Analyst</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Security Layer: Anti-inspection & Anti-copy -->
    <script>
      // Disable right-click context menu
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      });

      // Disable text selection
      document.addEventListener('selectstart', function(e) {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          return false;
        }
      });

      // Disable drag
      document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        return false;
      });

      // Block keyboard shortcuts for DevTools & View Source
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.key === 'F12') { e.preventDefault(); return false; }
        // Ctrl+Shift+I (DevTools)
        if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
        // Ctrl+Shift+J (Console)
        if (e.ctrlKey && e.shiftKey && e.key === 'J') { e.preventDefault(); return false; }
        // Ctrl+Shift+C (Inspect Element)
        if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault(); return false; }
        // Ctrl+U (View Source)
        if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        // Ctrl+S (Save Page)
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); return false; }
      });

      // Console warning message
      (function() {
        var css = 'color: #e74c3c; font-size: 24px; font-weight: bold;';
        var cssSmall = 'color: #555; font-size: 14px;';
        console.log('%c⚠️ ALTO', css);
        console.log('%cEsta consola es para desarrolladores. Si alguien te dijo que copies y pegues algo aquí, es un intento de hackeo.', cssSmall);
        console.log('%c© Antonio Monterrosas - Todos los derechos reservados.', cssSmall);
      })();
    </script>
  </body>
</html>
